name: widgetbook_ffvii
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  ffvii_app:
    path: ../

  widgetbook: ^3.21.0
  widgetbook_annotation: ^3.10.0
  flutter_riverpod: ^3.3.1

dev_dependencies:
  build_runner: ^2.4.9
  widgetbook_generator: ^3.8.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Reactor7 
      fonts:
        - asset: ../assets/fonts/reactor7.ttf
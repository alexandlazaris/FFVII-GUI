name: ffvii_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+7

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_riverpod: ^3.0.3
  dio: ^5.9.0
  custom_mouse_cursor: ^1.1.3
  package_info_plus: ^9.0.0
  widgetbook_annotation: ^3.0.0 

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  riverpod_lint: ^3.0.3
  custom_lint: ^0.8.0
  widgetbook: ^3.0.0 
  build_runner: ^2.4.0  

flutter:
  uses-material-design: true
  assets:
    - assets/

  fonts:
    - family: Reactor7
      fonts:
        - asset: ./assets/fonts/reactor7.ttf